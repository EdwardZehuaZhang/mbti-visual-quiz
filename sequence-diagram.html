<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Personality Quiz — Sequence Diagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f14;
    color: #e0e0ec;
    padding: 40px 30px 60px;
  }

  h1 { text-align: center; font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .subtitle { text-align: center; font-size: 12px; color: #666; margin-bottom: 8px; }
  .tag { text-align: center; font-size: 11px; color: #444; margin-bottom: 44px; letter-spacing: 0.06em; text-transform: uppercase; }

  /* ── Sequence diagram wrapper ── */
  .seq {
    position: relative;
    max-width: 1060px;
    margin: 0 auto;
  }

  /* ── Participant headers ── */
  .participants {
    display: flex;
    justify-content: space-between;
    position: relative;
    margin-bottom: 0;
  }
  .participant {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 120px;
    flex-shrink: 0;
  }
  .participant-box {
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
    width: 110px;
    position: relative;
    z-index: 2;
  }
  .participant-name { font-size: 11.5px; font-weight: 700; line-height: 1.4; }
  .participant-sub  { font-size: 10px; opacity: 0.6; margin-top: 2px; line-height: 1.3; }

  /* ── Lifelines ── */
  .lifelines {
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
  }

  /* ── Messages area ── */
  .messages {
    position: relative;
    padding-top: 20px;
  }

  /* ── Group / loop boxes ── */
  .group-box {
    border-radius: 8px;
    margin: 4px 0;
    position: relative;
  }
  .group-label {
    font-size: 9.5px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px 2px;
    border-radius: 6px 6px 0 0;
    display: inline-block;
  }
  .group-inner { padding: 4px 0 8px; }

  /* ── Section headings ── */
  .section-head {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #444;
    padding: 16px 0 6px 8px;
  }

  /* ── Arrow rows ── */
  .arrow-row {
    display: flex;
    align-items: center;
    position: relative;
    min-height: 36px;
    margin: 0;
  }

  /* Activation box on a lifeline */
  .act {
    position: absolute;
    width: 10px;
    border-radius: 3px;
    top: 0; bottom: 0;
    transform: translateX(-50%);
    z-index: 1;
  }

  /* Arrow SVG drawn by JS; we use CSS flex for label alignment */
  .arrow-label {
    position: absolute;
    white-space: nowrap;
    font-size: 11px;
    pointer-events: none;
    top: 50%;
    transform: translateY(-50%);
    padding: 1px 6px;
    border-radius: 4px;
  }
  .arrow-note {
    font-size: 10px;
    color: #666;
    font-style: italic;
  }

  /* Spacer */
  .spacer { height: 12px; }
  .spacer-sm { height: 6px; }

  /* ── Pretty SVG diagram (main) ── */
  svg.seqsvg {
    width: 100%;
    overflow: visible;
  }
</style>
</head>
